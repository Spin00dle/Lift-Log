<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="L3 Lift Log">
<title>Loui's Lift Log</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#080f0e;color:#e8f5f3;font-family:-apple-system,BlinkMacSystemFont,Helvetica,sans-serif;font-size:14px;min-height:100vh}
#app{max-width:500px;margin:0 auto;padding-bottom:90px;min-height:100vh;background-image:linear-gradient(#1e3530 1px,transparent 1px),linear-gradient(90deg,#1e3530 1px,transparent 1px);background-size:36px 36px}
.topbar{background:rgba(8,15,14,.97);border-bottom:1px solid #1e3530;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo-row{display:flex;align-items:center;gap:9px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#00c9a7,#38bdf8);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#080f0e;flex-shrink:0}
.logo-name{font-size:15px;font-weight:800;color:#00c9a7}
.logo-tagline{font-size:9px;color:#6b9e98;letter-spacing:1px;text-transform:uppercase}
.sess-wrap{text-align:right;font-size:10px;color:#6b9e98}
.sess-num{font-size:20px;font-weight:800;color:#00c9a7;display:block;line-height:1.1}
.daynav{display:flex;gap:6px;padding:10px 14px 6px;overflow-x:auto;background:#080f0e}
.daynav::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid #1e3530;background:#0d1a18;color:#6b9e98;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.dpill.active{background:linear-gradient(135deg,#00c9a7,#38bdf8);color:#080f0e;border-color:transparent}
.content{padding:4px 14px}
.day-title{font-size:24px;font-weight:800;padding:12px 0 2px;color:#00c9a7}
.day-sub{font-size:11px;color:#6b9e98;margin-bottom:6px}
.sec-head{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:2px;color:#00c9a7;text-transform:uppercase;margin:16px 0 7px}
.l3mark{font-size:12px;font-weight:900;color:#00c9a7;flex-shrink:0}
.sec-line{flex:1;height:1px;background:#1e3530}
.excard{background:#0d1a18;border:1px solid #1e3530;border-radius:13px;margin-bottom:7px;overflow:hidden}
.excard.open{border-color:#00a08a}
.exhead{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;cursor:pointer}
.exname{font-weight:600;font-size:14px;color:#e8f5f3}
.exsets{font-size:11px;color:#6b9e98;margin-top:2px}
.exright{display:flex;align-items:center;gap:7px}
.prpill{font-size:9px;font-weight:700;background:rgba(0,201,167,.15);color:#00c9a7;border:1px solid rgba(0,201,167,.3);border-radius:5px;padding:2px 6px}
.chev{color:#6b9e98;font-size:11px;transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(180deg)}
.exbody{display:none;padding:0 13px 13px;border-top:1px solid #1e3530}
.exbody.open{display:block}
.lgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:11px}
.lfield label{font-size:9px;color:#6b9e98;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;font-weight:600}
.lfield input{width:100%;background:#112220;border:1px solid #1e3530;border-radius:8px;padding:8px 9px;color:#e8f5f3;font-family:inherit;font-size:15px;outline:none}
.lfield input[type=date]{font-size:11px;color-scheme:dark}
.notefield{margin-top:7px}
.notefield label{font-size:9px;color:#6b9e98;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;font-weight:600}
.notefield input{width:100%;background:#112220;border:1px solid #1e3530;border-radius:8px;padding:8px 9px;color:#e8f5f3;font-family:inherit;font-size:13px;outline:none}
.savebtn{margin-top:9px;width:100%;padding:11px;border-radius:9px;border:none;background:linear-gradient(135deg,#00c9a7,#38bdf8);color:#080f0e;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
.histlabel{font-size:9px;font-weight:700;letter-spacing:1px;color:#6b9e98;text-transform:uppercase;margin:13px 0 6px}
.hrow{background:#112220;border-radius:8px;margin-bottom:4px;border:1px solid #1e3530;overflow:hidden}
.hrow-main{display:grid;grid-template-columns:60px 1fr 1fr auto;gap:4px;padding:7px 9px;align-items:center;font-size:12px}
.hdate{color:#6b9e98}
.hwt{font-weight:600;color:#00c9a7}
.hreps{color:#38bdf8}
.hdelbtn{background:none;border:none;color:#e53935;cursor:pointer;font-size:13px;padding:0 2px;font-family:inherit;line-height:1}
.hnote-row{font-size:11px;color:#6b9e98;padding:0 9px 7px;font-style:italic;border-top:1px solid #1e3530;padding-top:5px;margin-top:2px}
.nohist{font-size:12px;color:#6b9e98;font-style:italic;padding:5px 0}
.clearbtn{font-size:11px;color:#e53935;background:none;border:none;cursor:pointer;padding:6px 0;font-family:inherit;display:block}
.bottombar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,15,14,.97);border-top:1px solid #1e3530;padding:9px 14px 18px;display:flex;gap:7px}
.bbtn{flex:1;padding:11px 6px;border-radius:9px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:none}
.bbtn-dl{background:#112220;border:1px solid #00c9a7;color:#00c9a7}
.bbtn-up{background:#112220;border:1px solid #38bdf8;color:#38bdf8}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(16px);background:#163028;border:1px solid #00c9a7;color:#00c9a7;padding:9px 18px;border-radius:18px;font-size:13px;font-weight:600;transition:all .3s;z-index:200;pointer-events:none;opacity:0;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:#0d1a18;border:1px solid #1e3530;border-radius:15px;padding:22px;width:100%;max-width:340px}
.modal h3{font-size:17px;font-weight:800;margin-bottom:8px;color:#e8f5f3}
.modal p{font-size:13px;color:#6b9e98;margin-bottom:16px;line-height:1.6}
.mbtns{display:flex;gap:8px}
.mbtns button{flex:1;padding:11px;border-radius:9px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;border:none}
.mok{background:linear-gradient(135deg,#00c9a7,#38bdf8);color:#080f0e}
.mcancel{background:#112220;color:#6b9e98}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo-row">
      <div class="logo-icon">L3</div>
      <div>
        <div class="logo-name">Loui's Lift Log</div>
        <div class="logo-tagline">Track - Progress - Dominate</div>
      </div>
    </div>
    <div class="sess-wrap">
      <span class="sess-num" id="sessNum">0</span>sessions
    </div>
  </div>
  <div class="daynav" id="daynav"></div>
  <div class="content" id="content"></div>
</div>
<div class="bottombar">
  <button class="bbtn bbtn-dl" id="backupBtn">Download Backup</button>
  <button class="bbtn bbtn-up" id="restoreBtn">Restore Backup</button>
  <input type="file" id="upfile" accept=".json" style="display:none">
</div>
<div class="toast" id="toast"></div>
<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">Confirm</h3>
    <p id="modalMsg"></p>
    <div class="mbtns">
      <button class="mcancel" id="cancelBtn">Cancel</button>
      <button class="mok" id="confirmBtn">OK</button>
    </div>
  </div>
</div>
<script>
var DAYS = [
  {id:"d1",label:"Day 1",full:"Day 1",title:"Back and Biceps - Cable Day",sections:[
    {name:"Pull-Up Progression",ex:[
      {name:"Negative pull-ups",sets:"3 x 5 (5 sec lower)"},
      {name:"Band-assisted pull-ups",sets:"2 x 4-6"}
    ]},
    {name:"Cable Machine",ex:[
      {name:"Cable lat pulldown",sets:"3 x 10-12"},
      {name:"Cable seated row",sets:"3 x 10-12"},
      {name:"Cable face pulls",sets:"3 x 15"},
      {name:"Cable bicep curl",sets:"3 x 12"}
    ]},
    {name:"Adductor and Abductor",ex:[
      {name:"Hip abductor",sets:"3 x 15"},
      {name:"Hip adductor",sets:"3 x 15"}
    ]},
    {name:"Ab Finisher",ex:[
      {name:"Hanging knee raises",sets:"3 x 10-12"},
      {name:"Pallof press",sets:"3 x 12 each side"}
    ]}
  ]},
  {id:"d2",label:"Day 2",full:"Day 2",title:"Chest Shoulders and Triceps",sections:[
    {name:"Compound",ex:[
      {name:"Bar bench press",sets:"4 x 8-10"},
      {name:"DB incline press",sets:"3 x 10"},
      {name:"DB chest fly",sets:"3 x 12"}
    ]},
    {name:"Shoulders",ex:[
      {name:"DB overhead press",sets:"3 x 10-12"},
      {name:"Lateral raises",sets:"3 x 12-15"},
      {name:"Rear delt fly",sets:"3 x 12-15"}
    ]},
    {name:"Triceps",ex:[
      {name:"Overhead DB tricep extension",sets:"3 x 12"},
      {name:"Diamond push-ups",sets:"2 x max"}
    ]}
  ]},
  {id:"d3",label:"Day 3",full:"Day 3",title:"Legs and Glutes - Heavy",sections:[
    {name:"Compound",ex:[
      {name:"Goblet squat",sets:"4 x 10-12"},
      {name:"Romanian deadlift",sets:"3 x 10"}
    ]},
    {name:"Glutes and Isolation",ex:[
      {name:"Bulgarian split squat",sets:"3 x 10 each"},
      {name:"Hip thrust",sets:"4 x 12"},
      {name:"Calf raises",sets:"3 x 15"}
    ]},
    {name:"Ab Finisher",ex:[
      {name:"Reverse crunches",sets:"3 x 15"},
      {name:"Dead bug",sets:"3 x 10 each"}
    ]}
  ]},
  {id:"d4",label:"Day 4",full:"Day 4",title:"Back and Biceps",sections:[
    {name:"Pull-Up Progression",ex:[
      {name:"Chin-up",sets:"3 x max"},
      {name:"Negative pull-ups",sets:"2 x 5 (5 sec lower)"}
    ]},
    {name:"Back",ex:[
      {name:"DB bent-over row",sets:"3 x 10-12"},
      {name:"DB renegade row",sets:"3 x 8 each"}
    ]},
    {name:"Biceps",ex:[
      {name:"Bar bicep curl",sets:"3 x 12"},
      {name:"Hammer curl",sets:"3 x 12"}
    ]},
    {name:"Ab Finisher",ex:[
      {name:"Bicycle crunches",sets:"3 x 20"},
      {name:"Plank",sets:"3 x 30-45 sec"}
    ]}
  ]},
  {id:"d5",label:"Day 5",full:"Day 5",title:"Legs and Glutes - Burn and Shape",sections:[
    {name:"Compound",ex:[
      {name:"Sumo squat",sets:"4 x 12"},
      {name:"Reverse lunges",sets:"3 x 10 each"}
    ]},
    {name:"Hamstrings and Glutes",ex:[
      {name:"Single leg deadlift",sets:"3 x 10 each"},
      {name:"DB hamstring curl",sets:"3 x 12"},
      {name:"Glute kickbacks",sets:"3 x 15 each"}
    ]},
    {name:"Accessories",ex:[
      {name:"Lateral banded walks",sets:"3 x 15 each"},
      {name:"Calf raises",sets:"3 x 15"}
    ]}
  ]}
];

var curDay = DAYS[0];

function sk(dayId,name){return "lll_"+dayId+"_"+name.replace(/\W+/g,"_");}
function ld(k){try{return JSON.parse(localStorage.getItem(k)||"[]");}catch(e){return[];}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function td(){return new Date().toISOString().split("T")[0];}
function fmt(s){if(!s)return"";var p=s.split("-");return p[1]+"/"+p[2]+"/"+p[0].slice(2);}

function getPR(dayId,name){
  var logs=ld(sk(dayId,name));
  if(!logs.length)return null;
  return logs.reduce(function(b,l){return parseFloat(l.weight||0)>parseFloat(b?b.weight||0:0)?l:b;},null);
}

function getTot(){
  var t=0;
  DAYS.forEach(function(d){
    var dates=ld("lll_trained_"+d.id);
    t+=dates.length;
  });
  return t;
}

function recordSession(dayId){
  var key="lll_trained_"+dayId;
  var dates=ld(key);
  var today=td();
  if(dates.indexOf(today)===-1){dates.push(today);sv(key,dates);}
}

function showToast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  setTimeout(function(){el.classList.remove("show");},2200);
}

function showModal(title,msg,okLabel,onOk){
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalMsg").textContent=msg;
  document.getElementById("confirmBtn").textContent=okLabel;
  document.getElementById("modal").classList.add("open");
  document.getElementById("confirmBtn").onclick=function(){closeModal();onOk();};
}

function closeModal(){document.getElementById("modal").classList.remove("open");}
document.getElementById("cancelBtn").addEventListener("click",closeModal);
document.getElementById("modal").addEventListener("click",function(e){if(e.target===document.getElementById("modal"))closeModal();});

document.getElementById("backupBtn").addEventListener("click",function(){
  var bk={version:2,exported:new Date().toISOString(),data:{}};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith("lll_"))bk.data[k]=localStorage.getItem(k);
  }
  var blob=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="loui_lift_log_"+td()+".json";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast("Backup downloaded!");
});

document.getElementById("restoreBtn").addEventListener("click",function(){document.getElementById("upfile").click();});

document.getElementById("upfile").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var bk=JSON.parse(ev.target.result);
      if(!bk.data)throw new Error("bad");
      var pendingData=bk.data;
      showModal("Restore Backup?","Merge backup with current data. Nothing deleted, only new entries added.","Restore",function(){
        var count=0;
        Object.keys(pendingData).forEach(function(k){
          var v=pendingData[k];
          if(k.startsWith("lll_")&&k.indexOf("trained")===-1){
            try{
              var ex=JSON.parse(localStorage.getItem(k)||"[]");
              var inc=JSON.parse(v||"[]");
              inc.forEach(function(entry){
                var dup=ex.some(function(e){return e.date===entry.date&&e.weight===entry.weight&&e.reps===entry.reps;});
                if(!dup){ex.push(entry);count++;}
              });
              localStorage.setItem(k,JSON.stringify(ex));
            }catch(err){localStorage.setItem(k,v);}
          }else if(k.startsWith("lll_trained_")){
            try{
              var exd=JSON.parse(localStorage.getItem(k)||"[]");
              var ind=JSON.parse(v||"[]");
              ind.forEach(function(date){if(exd.indexOf(date)===-1)exd.push(date);});
              localStorage.setItem(k,JSON.stringify(exd));
            }catch(err){localStorage.setItem(k,v);}
          }
        });
        showToast("Restored "+count+" entries!");
        renderDay(curDay);
      });
    }catch(err){showToast("Invalid backup file");}
  };
  reader.readAsText(file);e.target.value="";
});

function renderDay(day){
  document.querySelectorAll(".dpill").forEach(function(p){p.classList.toggle("active",p.dataset.id===day.id);});
  var c=document.getElementById("content");
  c.innerHTML="";
  var t=document.createElement("div");t.className="day-title";t.textContent=day.full;c.appendChild(t);
  var s=document.createElement("div");s.className="day-sub";s.textContent=day.title;c.appendChild(s);
  day.sections.forEach(function(sec){
    var sh=document.createElement("div");sh.className="sec-head";
    sh.innerHTML="<span class='l3mark'>L3</span>"+sec.name+"<span class='sec-line'></span>";
    c.appendChild(sh);
    sec.ex.forEach(function(ex){c.appendChild(buildCard(day.id,ex));});
  });
  document.getElementById("sessNum").textContent=getTot();
}

function buildCard(dayId,ex){
  var key=ex.name.replace(/\W+/g,"_");
  var pr=getPR(dayId,ex.name);
  var card=document.createElement("div");card.className="excard";card.id="card_"+dayId+"_"+key;
  var head=document.createElement("div");head.className="exhead";
  var info=document.createElement("div");
  var ne=document.createElement("div");ne.className="exname";ne.textContent=ex.name;
  var se=document.createElement("div");se.className="exsets";se.textContent=ex.sets;
  info.appendChild(ne);info.appendChild(se);
  var right=document.createElement("div");right.className="exright";
  if(pr){var pill=document.createElement("span");pill.className="prpill";pill.textContent="PR "+pr.weight+"lbs";right.appendChild(pill);}
  var chev=document.createElement("span");chev.className="chev";chev.textContent="v";right.appendChild(chev);
  head.appendChild(info);head.appendChild(right);
  var body=document.createElement("div");body.className="exbody";
  var grid=document.createElement("div");grid.className="lgrid";
  function makeField(labelText,inputId,type,placeholder,extra){
    var f=document.createElement("div");f.className="lfield";
    var l=document.createElement("label");l.textContent=labelText;
    var i=document.createElement("input");i.type=type;i.id=inputId;i.placeholder=placeholder||"";
    if(extra)Object.keys(extra).forEach(function(k){i.setAttribute(k,extra[k]);});
    if(type==="date")i.value=td();
    f.appendChild(l);f.appendChild(i);return f;
  }
  grid.appendChild(makeField("Date","d_"+dayId+"_"+key,"date",""));
  grid.appendChild(makeField("Weight lbs","w_"+dayId+"_"+key,"number","0",{inputmode:"decimal",step:"2.5"}));
  grid.appendChild(makeField("Reps Done","r_"+dayId+"_"+key,"number","0",{inputmode:"numeric"}));
  var nf=document.createElement("div");nf.className="notefield";
  var nl=document.createElement("label");nl.textContent="Notes";
  var ni=document.createElement("input");ni.type="text";ni.id="n_"+dayId+"_"+key;ni.placeholder="How did it feel? Form cues...";
  nf.appendChild(nl);nf.appendChild(ni);
  var btn=document.createElement("button");btn.className="savebtn";btn.textContent="Save Entry";
  (function(dId,exName,k){btn.addEventListener("click",function(){logEntry(dId,exName,k);});})(dayId,ex.name,key);
  var hl=document.createElement("div");hl.className="histlabel";hl.textContent="Recent History";
  var hd=document.createElement("div");hd.id="hist_"+dayId+"_"+key;
  body.appendChild(grid);body.appendChild(nf);body.appendChild(btn);body.appendChild(hl);body.appendChild(hd);
  card.appendChild(head);card.appendChild(body);
  head.addEventListener("click",function(){
    var open=body.classList.toggle("open");
    chev.classList.toggle("open",open);
    card.classList.toggle("open",open);
  });
  renderHist(dayId,ex.name,key);
  return card;
}

function renderHist(dayId,name,key){
  var el=document.getElementById("hist_"+dayId+"_"+key);
  if(!el)return;
  var logs=ld(sk(dayId,name));
  if(!logs.length){el.innerHTML="<div class='nohist'>No entries yet</div>";return;}
  el.innerHTML="";
  var recent=logs.slice().reverse().slice(0,8);
  var startIdx=logs.length-1;
  recent.forEach(function(l,i){
    var realIdx=startIdx-i;
    var row=document.createElement("div");row.className="hrow";
    var main=document.createElement("div");main.className="hrow-main";
    var dateEl=document.createElement("span");dateEl.className="hdate";dateEl.textContent=fmt(l.date);
    var wtEl=document.createElement("span");wtEl.className="hwt";wtEl.textContent=l.weight?l.weight+"lbs":"--";
    var repsEl=document.createElement("span");repsEl.className="hreps";repsEl.textContent=l.reps?l.reps+" reps":"--";
    var delBtn=document.createElement("button");delBtn.className="hdelbtn";delBtn.textContent="x";
    (function(dId,n,k,idx,entry){
      delBtn.addEventListener("click",function(e){
        e.stopPropagation();
        var desc=fmt(entry.date)+(entry.weight?" - "+entry.weight+"lbs":"")+(entry.reps?" - "+entry.reps+" reps":"");
        showModal("Delete Entry?","Remove: "+desc+"?","Delete",function(){
          var logs2=ld(sk(dId,n));
          logs2.splice(idx,1);
          sv(sk(dId,n),logs2);
          renderHist(dId,n,k);
          document.getElementById("sessNum").textContent=getTot();
          var newPR=getPR(dId,n);
          var card=document.getElementById("card_"+dId+"_"+k);
          if(card){
            var pill=card.querySelector(".prpill");
            if(newPR){
              if(!pill){pill=document.createElement("span");pill.className="prpill";card.querySelector(".exright").insertBefore(pill,card.querySelector(".chev"));}
              pill.textContent="PR "+newPR.weight+"lbs";
            }else{if(pill)pill.remove();}
          }
        });
      });
    })(dayId,name,key,realIdx,l);
    main.appendChild(dateEl);main.appendChild(wtEl);main.appendChild(repsEl);main.appendChild(delBtn);
    row.appendChild(main);
    if(l.notes&&l.notes.trim()){
      var nr=document.createElement("div");nr.className="hnote-row";nr.textContent="Note: "+l.notes;
      row.appendChild(nr);
    }
    el.appendChild(row);
  });
  var cb=document.createElement("button");cb.className="clearbtn";cb.textContent="Clear all history";
  (function(dId,n,k){
    cb.addEventListener("click",function(){
      showModal("Clear History?","Delete ALL history for "+n+"? This cannot be undone.","Clear All",function(){
        localStorage.removeItem(sk(dId,n));
        renderHist(dId,n,k);
        var card=document.getElementById("card_"+dId+"_"+k);
        if(card){var p=card.querySelector(".prpill");if(p)p.remove();}
        showToast("History cleared");
      });
    });
  })(dayId,name,key);
  el.appendChild(cb);
}

function logEntry(dayId,name,key){
  var d=document.getElementById("d_"+dayId+"_"+key);
  var w=document.getElementById("w_"+dayId+"_"+key);
  var r=document.getElementById("r_"+dayId+"_"+key);
  var n=document.getElementById("n_"+dayId+"_"+key);
  var date=d?d.value:td();var weight=w?w.value:"";var reps=r?r.value:"";var notes=n?n.value:"";
  if(!weight&&!reps){showToast("Enter weight or reps!");return;}
  var k=sk(dayId,name);var logs=ld(k);var pr=getPR(dayId,name);
  logs.push({date:date,weight:weight,reps:reps,notes:notes});sv(k,logs);
  recordSession(dayId);
  var isPR=weight&&parseFloat(weight)>parseFloat(pr?pr.weight||0:0);
  showToast(isPR?"New PR! Crushed it!":"Entry saved!");
  if(w)w.value="";if(r)r.value="";if(n)n.value="";
  renderHist(dayId,name,key);
  document.getElementById("sessNum").textContent=getTot();
  var newPR=getPR(dayId,name);
  var card=document.getElementById("card_"+dayId+"_"+key);
  if(card&&newPR){
    var right=card.querySelector(".exright");
    var pill=right.querySelector(".prpill");
    if(!pill){pill=document.createElement("span");pill.className="prpill";right.insertBefore(pill,right.querySelector(".chev"));}
    pill.textContent="PR "+newPR.weight+"lbs";
  }
}

var nav=document.getElementById("daynav");
DAYS.forEach(function(d){
  var pill=document.createElement("button");
  pill.className="dpill";pill.dataset.id=d.id;pill.textContent=d.label;
  pill.addEventListener("click",function(){curDay=d;renderDay(d);});
  nav.appendChild(pill);
});
curDay=DAYS[0];
renderDay(curDay);
</script>
